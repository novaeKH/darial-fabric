services:
  kafka-health-snapshot-worker:
    build:
      context: ./backend
    container_name: darial-kafka-health-snapshot-worker
    command: python -m app.kafka_health_snapshot_worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      KAFKA_HEALTH_SNAPSHOT_INTERVAL_SECONDS: "60"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
