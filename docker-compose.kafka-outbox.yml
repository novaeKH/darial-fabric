services:
  kafka-outbox-publisher:
    build:
      context: ./backend
    restart: unless-stopped
    command: python -m app.kafka_outbox_publisher
    env_file:
      - ./backend/.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_TELEMETRY_TOPIC: darial.telemetry.events
      KAFKA_OUTBOX_POLL_INTERVAL_SECONDS: "2"
      KAFKA_OUTBOX_BATCH_SIZE: "100"
      KAFKA_OUTBOX_MAX_RETRIES: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - default
