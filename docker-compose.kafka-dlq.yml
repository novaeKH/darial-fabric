services:
  kafka-dlq-worker:
    build:
      context: ./backend
    container_name: darial-kafka-dlq-worker
    command: python -m app.kafka_dlq_worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_DLQ_TOPIC: darial.telemetry.dlq
      KAFKA_DLQ_CONSUMER_GROUP: darial-telemetry-dlq-registry-v1
      KAFKA_DLQ_AUTO_OFFSET_RESET: earliest
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
