name: takt
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: swf_user
      POSTGRES_PASSWORD: swf_password
      POSTGRES_DB: swf_db
    ports:
      - "5432:5432"
    volumes:
      - swf_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swf_user -d swf_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: swf_minio
      MINIO_ROOT_PASSWORD: swf_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - swf_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/tmp:/app/tmp
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs', timeout=3)\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  synthetic-worker:
    build:
      context: ./backend
    command: python -m app.workers.synthetic_data_worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/tmp:/app/tmp
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped


  ingestion-worker:
    build:
      context: ./backend
    command: python -m app.ingestion_worker
    env_file:
      - ./backend/.env
    environment:
      INGESTION_POLL_INTERVAL_SECONDS: 5
      INGESTION_BATCH_SIZE: 200
      INGESTION_MAX_RETRIES: 3
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  swf_postgres_data:
  swf_minio_data: